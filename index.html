<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHUMI - Digital Land Economy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #022c22; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen { 
            position: fixed; 
            inset: 0; 
            z-index: 9999; 
            background: #022c22; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: opacity 1s ease;
        }

        .logo-box {
            font-size: 8rem;
            color: #10b981;
            animation: pulse3d 2s infinite ease-in-out;
        }

        @keyframes pulse3d {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.2)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 30px rgba(16, 185, 129, 0.6)); }
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 40px;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: #10b981;
            animation: loadProgress 3s forwards;
        }

        @keyframes loadProgress {
            to { width: 100%; }
        }

        /* --- UTILITIES --- */
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 35px; 
        }
        
        .hidden { display: none !important; }
        
        #login-section, #dashboard {
            opacity: 0;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-box"><i class="fa-solid fa-cube"></i></div>
        <h1 class="text-5xl font-black tracking-[12px] mt-4 uppercase">BHUMI</h1>
        <p class="text-[10px] mt-2 text-green-300/40 uppercase tracking-[5px]">Vivand Software Pvt Ltd</p>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>

    <div id="login-section" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="glass p-10 w-full max-w-md text-center">
            <h2 class="text-4xl font-black mb-2">Access Portal</h2>
            <p class="text-green-400/60 text-xs mb-8 uppercase tracking-widest">Secure Blockchain Entry</p>
            
            <div id="login-form">
                <input type="tel" id="user-phone" placeholder="9420545485" 
                    class="w-full bg-white/5 p-5 rounded-2xl mb-6 text-center text-xl outline-none border border-white/10 focus:border-green-500 transition-all">
                <div id="recaptcha-container" class="flex justify-center mb-6"></div>
                <button onclick="sendOTP()" class="bg-green-600 hover:bg-green-500 w-full py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl transition-all">
                    Initialize Login
                </button>
            </div>

            <div id="otp-form" class="hidden">
                <input type="number" id="otp-code" placeholder="000000" 
                    class="w-full bg-white/10 p-5 rounded-2xl mb-6 text-center text-4xl font-black tracking-[10px] outline-none border-2 border-green-500">
                <button onclick="verifyOTP()" class="bg-white text-green-900 w-full py-5 rounded-2xl font-black uppercase shadow-lg">
                    Confirm Identity
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen p-6 pb-28 overflow-y-auto">
        <div class="flex justify-between items-start mb-8">
            <div>
                <h2 class="text-4xl font-black">Portfolio</h2>
                <p class="text-green-400 text-sm font-bold tracking-widest uppercase">Verified Investor</p>
            </div>
            <button onclick="location.reload()" class="bg-red-500/10 p-4 rounded-2xl border border-red-500/20 text-red-500">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>

        <div class="glass p-8 mb-10 border-l-8 border-green-500 relative">
            <p class="text-xs uppercase text-white/50 mb-1">Asset Value</p>
            <h3 class="text-4xl font-black">₹ 42,50,000</h3>
        </div>

        <div class="glass overflow-hidden mb-6">
            <img src="https://images.unsplash.com/photo-1500382017468-9049fee74a62?auto=format&fit=crop&w=800&q=80" class="w-full h-52 object-cover">
            <div class="p-6 text-center">
                <h5 class="text-xl font-bold mb-4">Vivand Heights - Sector 4</h5>
                <div class="flex gap-3">
                    <button onclick="contactAgent('Vivand Heights')" class="flex-1 bg-green-600 py-4 rounded-2xl font-black text-xs uppercase">Market Trade</button>
                    <button class="flex-1 bg-white text-black py-4 rounded-2xl font-black text-xs uppercase">Develop 3D</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA0BKZSSQJ9B7kY-k8d-bcbFIHKvVOA2VQ",
            authDomain: "bhumi-real-estate.firebaseapp.com",
            projectId: "bhumi-real-estate",
            storageBucket: "bhumi-real-estate.firebasestorage.app",
            messagingSenderId: "794838101327",
            appId: "1:794838101327:web:3ac539383cafc519fce93a",
            measurementId: "G-27YBEC031J"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- SPLASH TO LOGIN TRANSITION ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const login = document.getElementById('login-section');
                
                if(splash && login) {
                    splash.style.opacity = "0";
                    setTimeout(() => {
                        splash.classList.add('hidden');
                        login.classList.remove('hidden');
                        setTimeout(() => { 
                            login.style.opacity = "1";
                            document.body.style.overflow = "auto";
                        }, 50);
                    }, 1000);
                }
            }, 3500);
        });

        // --- AUTH LOGIC ---
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'normal' });

        window.sendOTP = function() {
            let phone = document.getElementById('user-phone').value;
            if(!phone.startsWith('+')) phone = '+91' + phone;
            signInWithPhoneNumber(auth, phone, window.recaptchaVerifier).then(res => {
                window.confirmationResult = res;
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('otp-form').classList.remove('hidden');
            }).catch(err => alert("Error: " + err.message));
        };

        window.verifyOTP = function() {
            const code = document.getElementById('otp-code').value;
            window.confirmationResult.confirm(code).then(() => {
                document.getElementById('login-section').classList.add('hidden');
                const dash = document.getElementById('dashboard');
                dash.classList.remove('hidden');
                setTimeout(() => dash.style.opacity = "1", 50);
            }).catch(() => alert("Code incorrect"));
        };

        window.contactAgent = function(prop) {
            window.open(`https://wa.me/919420545485?text=I want to trade: ${prop}`, '_blank');
        };
    </script>
</body>
</html>
