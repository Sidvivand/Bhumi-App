<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhumi - Secure Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #2d5a27; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2d5a27; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #recaptcha-container { margin: 10px 0; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>BHUMI</h2>
    <p>Virtual Real Estate Security</p>
    <div id="login-form">
        <input type="tel" id="phone" placeholder="+91 0000000000">
        <div id="recaptcha-container"></div>
        <button onclick="sendOTP()">Send OTP</button>
    </div>
    <div id="otp-form" style="display:none;">
        <input type="number" id="otp" placeholder="Enter 6-digit OTP">
        <button onclick="verifyOTP()">Verify & Register</button>
    </div>
</div>

    // 5. The function to send the OTP
    window.sendOTP = function() {
        const phoneNumber = document.getElementById('phone').value;
        const appVerifier = window.recaptchaVerifier;

        signInWithPhoneNumber(auth, phoneNumber, appVerifier)
            .then((confirmationResult) => {
                window.confirmationResult = confirmationResult;
                document.getElementById('otp-form').style.display = 'block';
                alert("OTP Sent Successfully!");
            }).catch((error) => {
                alert("Error: " + error.message);
            });
    }

    // 6. The function to verify the OTP
    window.verifyOTP = function() {
        const code = document.getElementById('otp').value;
        window.confirmationResult.confirm(code).then((result) => {
