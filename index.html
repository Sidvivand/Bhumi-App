            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHUMI - 3D Virtual Estate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #022c22;
            margin: 0;
            overflow: hidden;
        }

        /* --- ADVANCED 3D SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: radial-gradient(circle at center, #065f46 0%, #022c22 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* The 3D Symbol: A Floating Earth/Land Leaf */
        .logo-icon {
            position: relative;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50% 0 50% 50%; /* Leaf Shape */
            transform: rotate(-45deg);
            box-shadow: 0 20px 50px rgba(16, 185, 129, 0.5), inset -5px -5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 3s infinite ease-in-out;
            margin-bottom: 20px;
        }

        .logo-icon i {
            transform: rotate(45deg);
            color: white;
            font-size: 2.5rem;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        .logo-text {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: white;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-top: 10px;
        }

        .tagline {
            color: #10b981;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: -5px;
            opacity: 0;
            animation: fadeIn 1s forwards 1s;
        }

        @keyframes float {
            0%, 100% { transform: rotate(-45deg) translateY(0); }
            50% { transform: rotate(-45deg) translateY(-20px); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .loader-container {
            width: 180px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 40px;
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: fill 2.5s ease-in-out forwards;
        }

        @keyframes fill {
            to { width: 100%; }
        }

        /* --- FADE OUT ANIMATION --- */
        .fade-out {
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s ease-in-out;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-icon">
            <i class="fa-solid fa-mountain-sun"></i>
        </div>
        <div class="logo-text">BHUMI</div>
        <div class="tagline">Virtual Land, Real Future</div>
        
        <div class="loader-container">
            <div class="loader-fill"></div>
        </div>
    </div>
