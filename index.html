<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHUMI - 3D Virtual Estate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            margin: 0;
            overflow: hidden;
            background: #022c22;
        }

        /* --- SPLASH SCREEN WITH BG IMAGE --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: linear-gradient(rgba(2, 44, 34, 0.8), rgba(2, 44, 34, 0.95)), 
                        url('https://images.unsplash.com/photo-1500382017468-9049fee74a62?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 3D Floating Icon */
        .logo-icon {
            position: relative;
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50% 0 50% 50%;
            transform: rotate(-45deg);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset -5px -5px 15px rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 3s infinite ease-in-out;
            margin-bottom: 25px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .logo-icon i {
            transform: rotate(45deg);
            color: white;
            font-size: 2.8rem;
        }

        .logo-text {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 10px;
            color: white;
            text-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .tagline {
            color: #34d399;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        @keyframes float {
            0%, 100% { transform: rotate(-45deg) translateY(0); }
            50% { transform: rotate(-45deg) translateY(-25px); }
        }

        .loader-container {
            width: 220px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            margin-top: 50px;
            border-radius: 10px;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #10b981, #34d399);
            box-shadow: 0 0 15px #10b981;
            animation: fill 3s ease-in-out forwards;
        }

        @keyframes fill { to { width: 100%; } }

        /* Smooth Transition */
        .fade-out {
            opacity: 0;
            visibility: hidden;
            transition: all 1s ease-in-out;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-icon">
            <i class="fa-solid fa-seedling"></i>
        </div>
        <div class="logo-text">BHUMI</div>
        <div class="tagline">Virtual Land, Real Future</div>
        
        <div class="loader-container">
            <div class="loader-fill"></div>
        </div>
    </div>

    <div id="app-content" class="hidden opacity-0 transition-opacity duration-1000 flex items-center justify-center min-h-screen p-4">
        <div class="bg-black/40 backdrop-blur-2xl p-10 rounded-[45px] border border-white/10 text-center w-full max-w-sm shadow-2xl">
             <div class="inline-block p-3 bg-green-500/20 rounded-2xl mb-4">
                <i class="fa-solid fa-shield-halved text-green-400 text-2xl"></i>
             </div>
             <h2 class="text-3xl font-bold mb-8">Secure Access</h2>
             <div id="login-form">
                <input type="tel" id="user-phone" placeholder="9420545485" 
                    class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-6 text-center text-white outline-none focus:border-green-500 transition-all">
                <div id="recaptcha-container" class="flex justify-center mb-6"></div>
                <button onclick="sendOTP()" class="bg-green-600 hover:bg-green-500 w-full py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-green-900/20 transition-all">
                    Get Access Code
                </button>
             </div>
             <div id="otp-form" class="hidden">
                <input type="number" id="otp-code" placeholder="Enter OTP" 
                    class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-6 text-center text-3xl font-black tracking-widest text-white outline-none">
                <button onclick="verifyOTP()" class="bg-white text-green-900 w-full py-5 rounded-2xl font-black uppercase tracking-widest">
                    Verify & Enter
                </button>
             </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA0BKZSSQJ9B7kY-k8d-bcbFIHKvVOA2VQ",
            authDomain: "bhumi-real-estate.firebaseapp.com",
            projectId: "bhumi-real-estate",
            storageBucket: "bhumi-real-estate.firebasestorage.app",
            messagingSenderId: "794838101327",
            appId: "1:794838101327:web:3ac539383cafc519fce93a",
            measurementId: "G-27YBEC031J"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Splash Timeout
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const content = document.getElementById('app-content');
                splash.classList.add('fade-out');
                setTimeout(() => {
                    splash.style.display = 'none';
                    content.classList.remove('hidden');
                    setTimeout(() => content.style.opacity = '1', 50);
                }, 1000);
            }, 3500);
        });

        // Auth Functions
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'normal' });
        window.sendOTP = function() {
            let phone = document.getElementById('user-phone').value;
            if(!phone.startsWith('+')) phone = '+91' + phone;
            signInWithPhoneNumber(auth, phone, window.recaptchaVerifier).then(res => {
                window.confirmationResult = res;
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('otp-form').classList.remove('hidden');
            }).catch(err => alert("Error: " + err.message));
        }
        window.verifyOTP = function() {
            const code = document.getElementById('otp-code').value;
            window.confirmationResult.confirm(code).then(() => {
                alert("Login Success! Welcome to Bhumi.");
                // Ready for Dashboard
            }).catch(() => alert("Invalid OTP Code"));
        }
    </script>
</body>
</html>
